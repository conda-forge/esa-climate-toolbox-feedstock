{% set python_min = "3.10" %}
{% set name = "esa-climate-toolbox" %}
{% set version = "1.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/esa-cci/esa-climate-toolbox/archive/v{{ version }}.tar.gz
  sha256: bded5098c5bb92f33b4b4772f402f782a5232f5bcda39522debe50c64fe6cb1e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    # Required
    - cartopy
    - cftime
    - dask
    - geopandas >=0.14
    - matplotlib-base
    - numba >0.35
    - numcodecs
    - numpy
    - pandas <3
    - pyproj
    - python-dateutil
    - shapely
    - simplekml
    - six
    - xarray
    - xcube >=1.8.0
    - xcube-cci >=0.13
    - zarr <3

test:
  requires:
    - python {{ python_min }}
  imports:
    - esa_climate_toolbox

about:
  home: https://github.com/esa-cci/esa-climate-toolbox
  summary: 'A python package to provide access to CCI data from the ESA Open Data Portal'
  description: |
    The ESA CCI Toolbox is designed to provide access to CCI data
    from the ESA Open Data Portal.
    Also, it contains functions to operate on this data.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: https://github.com/esa-cci/esa-climate-toolbox

extra:
  recipe-maintainers:
    - AliceBalfanz
    - b-yogesh
    - clarasb
    - forman
    - konstntokas
    - pont-us
    - TejasMorbagal
    - thomasstorm
    - TonioF
